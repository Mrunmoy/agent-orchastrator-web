<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Requirements Viewer</title>
  <style>
    :root { --ink:#f3e7c9; --muted:#b8ac8d; --gold:#d6b164; --bg:#0c0f16; --panel:#1b2130; --surface:#232840; --ok:#4ade80; --warn:#facc15; --err:#f87171; }
    * { box-sizing: border-box; }
    body { margin:0; background:radial-gradient(circle at 20% 0,#243149,var(--bg) 55%); color:var(--ink); font-family: Georgia, serif; min-height:100vh; }
    .page { max-width:1020px; margin:32px auto; padding:36px; border:1px solid #5a4728; border-radius:16px; background:linear-gradient(180deg,var(--panel),#111521); box-shadow:0 16px 48px #0008; }
    h1 { color:var(--gold); font-size:2.2rem; margin:0 0 6px; }
    h2 { color:var(--gold); font-size:1.4rem; margin:32px 0 12px; border-bottom:1px solid #5a4728; padding-bottom:6px; }
    h3 { color:var(--gold); font-size:1.1rem; margin:20px 0 8px; }
    p,li { line-height:1.7; }
    a { color:var(--gold); }
    .meta { color:var(--muted); margin-bottom:24px; font-size:0.95em; }
    .intro { color:var(--muted); font-style:italic; margin:8px 0 16px; }
    .req { background:var(--surface); border-left:3px solid var(--gold); padding:12px 16px; margin:12px 0; border-radius:0 8px 8px 0; }
    .req-header { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .req-id { color:var(--gold); font-weight:bold; font-size:0.9em; }
    .req-text { margin-top:4px; }
    .priority { display:inline-block; padding:1px 8px; border-radius:4px; font-size:0.75em; font-weight:bold; }
    .p0 { background:#dc2626; color:#fff; }
    .p1 { background:#f59e0b; color:#111; }
    .p2 { background:#3b82f6; color:#fff; }
    .status { display:inline-block; padding:1px 8px; border-radius:4px; font-size:0.75em; font-weight:bold; }
    .status-todo { background:#64748b; color:#fff; }
    .status-in_design { background:#a78bfa; color:#111; }
    .status-implementing { background:#38bdf8; color:#111; }
    .status-testing { background:#facc15; color:#111; }
    .status-done { background:#4ade80; color:#111; }
    .traceability { margin-top:6px; font-size:0.8em; color:var(--muted); }
    .traceability span { margin-right:12px; }
    .traceability .linked { color:var(--ok); }
    .traceability .missing { color:var(--err); }

    /* Summary table */
    table { border-collapse:collapse; width:100%; margin:12px 0; }
    th,td { border:1px solid #5a4728; padding:8px 12px; text-align:left; }
    th { background:var(--surface); color:var(--gold); }

    /* Nav */
    .nav { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
    .nav a { display:inline-block; padding:6px 14px; background:var(--surface); border:1px solid #5a4728; border-radius:6px; color:var(--gold); text-decoration:none; font-size:0.85em; transition:background 0.15s; }
    .nav a:hover, .nav a.active { background:#3a3f5a; }
    .nav a.home { background:transparent; border-color:var(--gold); }

    /* Stats bar */
    .stats { display:flex; gap:16px; flex-wrap:wrap; margin:16px 0; padding:12px 16px; background:var(--surface); border-radius:8px; }
    .stat { text-align:center; }
    .stat-num { font-size:1.6em; font-weight:bold; color:var(--gold); }
    .stat-label { font-size:0.75em; color:var(--muted); }

    .loading { text-align:center; padding:60px; color:var(--muted); font-size:1.2em; }
    .error { text-align:center; padding:60px; color:var(--err); font-size:1.1em; }
  </style>
</head>
<body>
  <article class="page">
    <div class="nav" id="nav"></div>
    <div id="content"><div class="loading">Loading...</div></div>
  </article>

  <script>
    const DOCS = [
      { key: '01-product',          label: '01 Product' },
      { key: '02-ui-ux',            label: '02 UI/UX' },
      { key: '03-backend-api',      label: '03 Backend' },
      { key: '04-orchestration',    label: '04 Orchestration' },
      { key: '05-integration',      label: '05 Integration' },
      { key: '06-merge-coordination', label: '06 Merge' },
    ];

    function getDocKey() {
      const p = new URLSearchParams(location.search);
      return p.get('doc') || DOCS[0].key;
    }

    function buildNav(activeKey) {
      const nav = document.getElementById('nav');
      nav.innerHTML = '<a class="home" href="traceability.html">Traceability Matrix</a>';
      for (const d of DOCS) {
        const a = document.createElement('a');
        a.href = `?doc=${d.key}`;
        a.textContent = d.label;
        if (d.key === activeKey) a.classList.add('active');
        nav.appendChild(a);
      }
    }

    function priorityClass(p) {
      return p.toLowerCase().replace(/\s/g, '');
    }

    function statusClass(s) {
      return 'status-' + s;
    }

    function statusLabel(s) {
      return s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    function getAllReqs(doc) {
      const reqs = [];
      for (const sec of doc.sections) {
        for (const sub of (sec.subsections || [])) {
          for (const r of (sub.requirements || [])) {
            reqs.push(r);
          }
        }
      }
      return reqs;
    }

    function renderStats(reqs) {
      const total = reqs.length;
      const p0 = reqs.filter(r => r.priority === 'P0').length;
      const p1 = reqs.filter(r => r.priority === 'P1').length;
      const p2 = reqs.filter(r => r.priority === 'P2').length;
      const done = reqs.filter(r => r.status === 'done').length;
      const withDesign = reqs.filter(r => r.design_ref).length;
      const withTests = reqs.filter(r => r.tests && r.tests.length > 0).length;

      return `<div class="stats">
        <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">Total</div></div>
        <div class="stat"><div class="stat-num" style="color:#dc2626">${p0}</div><div class="stat-label">P0</div></div>
        <div class="stat"><div class="stat-num" style="color:#f59e0b">${p1}</div><div class="stat-label">P1</div></div>
        <div class="stat"><div class="stat-num" style="color:#3b82f6">${p2}</div><div class="stat-label">P2</div></div>
        <div class="stat"><div class="stat-num" style="color:#4ade80">${done}</div><div class="stat-label">Done</div></div>
        <div class="stat"><div class="stat-num">${withDesign}</div><div class="stat-label">Designed</div></div>
        <div class="stat"><div class="stat-num">${withTests}</div><div class="stat-label">Tested</div></div>
      </div>`;
    }

    function renderReq(r) {
      const designTag = r.design_ref
        ? `<span class="linked">Design: ${r.design_ref}</span>`
        : `<span class="missing">Design: —</span>`;
      const taskTag = r.tasks && r.tasks.length
        ? `<span class="linked">Tasks: ${r.tasks.join(', ')}</span>`
        : `<span class="missing">Tasks: —</span>`;
      const testTag = r.tests && r.tests.length
        ? `<span class="linked">Tests: ${r.tests.length}</span>`
        : `<span class="missing">Tests: —</span>`;

      return `<div class="req">
        <div class="req-header">
          <span class="req-id">${r.id}</span>
          <span class="priority ${priorityClass(r.priority)}">${r.priority}</span>
          <span class="status ${statusClass(r.status)}">${statusLabel(r.status)}</span>
        </div>
        <div class="req-text">${r.text}</div>
        <div class="traceability">${designTag} ${taskTag} ${testTag}</div>
      </div>`;
    }

    function renderDoc(doc) {
      let html = `<h1>${doc.title}</h1>`;
      html += `<div class="meta">${doc.id} &middot; Agent Orchestrator Web &middot; ${doc.date}</div>`;

      const allReqs = getAllReqs(doc);
      html += renderStats(allReqs);

      for (const sec of doc.sections) {
        html += `<h2>${sec.title}</h2>`;
        if (sec.intro) html += `<p class="intro">${sec.intro}</p>`;
        for (const sub of (sec.subsections || [])) {
          if (sub.title !== sec.title) html += `<h3>${sub.title}</h3>`;
          for (const r of (sub.requirements || [])) {
            html += renderReq(r);
          }
        }
      }

      // Summary table
      html += `<h2>Requirements Summary</h2><table>
        <tr><th>ID</th><th>Priority</th><th>Area</th><th>Status</th><th>Design</th><th>Tasks</th><th>Tests</th></tr>`;
      for (const r of allReqs) {
        const d = r.design_ref || '—';
        const t = r.tasks && r.tasks.length ? r.tasks.join(', ') : '—';
        const te = r.tests && r.tests.length ? r.tests.length : '—';
        html += `<tr>
          <td>${r.id}</td>
          <td><span class="priority ${priorityClass(r.priority)}">${r.priority}</span></td>
          <td>${r.area}</td>
          <td><span class="status ${statusClass(r.status)}">${statusLabel(r.status)}</span></td>
          <td>${d}</td><td>${t}</td><td>${te}</td>
        </tr>`;
      }
      html += '</table>';
      return html;
    }

    function main() {
      const key = getDocKey();
      buildNav(key);
      const el = document.getElementById('content');
      const data = window.__REQ_DATA__;
      if (!data || !data[key]) {
        el.innerHTML = `<div class="error">Data not found for "${key}".<br/>Run <code>python3 build.py</code> to regenerate _bundle.js</div>`;
        return;
      }
      const doc = data[key];
      document.title = doc.title + ' — Requirements';
      el.innerHTML = renderDoc(doc);
    }
  </script>
  <script src="_bundle.js"></script>
  <script>main();</script>
</body>
</html>
